name: 'Obtenir le version et la balise de sortie'
description: "À l'aide de GitVersion, déduit le numéro de version (semver)"

inputs:
  buildNumberField:
    description: "Nom de la variable retournée par GitVersion qui contient le numéro de build."
    default: ShortSha
  preReleaseNumberField:
    description: "Nom de la variable retournée par GitVersion qui contient le numéro de build du release. Conservé pour compatibilité avec les anciens workflows."
    default: ShortSha
  mainBranchNameRegex:
    description: "Regex de la branche main"
    default: ^master$|^main$|^prod$
  releaseBranchNameRegex:
    description: "Regex de la branche release"
    default: ^release[\/-]
  versionPrefix:
    description: "Préfixe de la version (ex : 'v') qui sera systématiquement ajouté au début du tag de version" 
    default: ''

outputs:
  semVer:
    description: "Version de semver (<majeure>.<mineure>.<revision> pour 'main' ou <majeure>.<mineure>.<revision>-<prebuild>.<YYYYMMDD>.<SSSSS>.<hashcommit>)"
    value: ${{ steps.calculerVersion.outputs.semVer }}
    
runs:
  using: "composite"
  steps:
  - name: Checkout code
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup GitVersion
    uses: gittools/actions/gitversion/setup@v1.1.1
    with:
      versionSpec: '6.0.x' # TODO : On ne peut pas monter à >= 6.1.x, probablement à cause de la version de Node.js. À ajuster
  
  - name: Determine Version
    id: gitversion 
    uses: gittools/actions/gitversion/execute@v1.1.1

  - name: Préparer le path github pour la prochaine étape
    run: echo "$GITHUB_ACTION_PATH" >> $GITHUB_PATH
    shell: bash
    env:
      GITHUB_ACTION_PATH: ${{ github.action_path }}

  - name: Calculer la version pour l'output
    id: calculerVersion
    shell: bash
    env: 
      # GitVersion demeure la source de référence pour la portion stable
      # Major.Minor.Patch; le script ajoute seulement le suffixe de préversion.
      MAJOR_MINOR_PATCH: ${{ steps.gitversion.outputs.majorMinorPatch }}

      # Le label GitVersion indique le contexte GitFlow attendu: feature-*,
      # dev, rc, hotfix-*, etc. Le script l'utilise pour le segment prebuild.
      PRE_RELEASE_LABEL: ${{ steps.gitversion.outputs.preReleaseLabel }}

      # Ces deux variables restent exposées pour compatibilité avec les anciens
      # paramètres, même si le nouveau format n'utilise plus un compteur GitVersion
      # comme dernier segment de version.
      BUILD_NUMBER: ${{ steps.gitversion.outputs[inputs.buildNumberField] }}
      PRE_RELEASE_NUMBER: ${{ steps.gitversion.outputs[inputs.preReleaseNumberField] }}

      # Le hash court rend chaque préversion traçable jusqu'au commit exact.
      # github.sha sert de repli si shortSha n'est pas fourni par GitVersion.
      COMMIT_HASH: ${{ steps.gitversion.outputs.shortSha }}
      GITHUB_SHA: ${{ github.sha }}

      # Le préfixe optionnel permet de générer des tags comme v1.2.3 si le dépôt
      # le souhaite, tout en gardant le format de préversion standardisé.
      VERSION_PREFIX: ${{ inputs.versionPrefix }}

      # Les regex de branches permettent au script de distinguer la version stable
      # main/prod/master des préversions release, feature, develop et hotfix.
      GITHUB_REF: ${{ github.ref }} 
      MAIN_BRANCH_NAME_REGEX: ${{ inputs.mainBranchNameRegex }}
      RELEASE_BRANCH_NAME_REGEX: ${{ inputs.releaseBranchNameRegex }}
    run: get_semver.sh
