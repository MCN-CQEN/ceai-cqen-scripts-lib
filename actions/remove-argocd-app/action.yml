name: "Desinstaller une application dans ArgoCD"
description: "Desinstaller une application dans ArgoCD si elle existe"

inputs:
  argocd_server:
    description: "URL du serveur Argo CD"
    required: true
  argocd_version:
    description: "La version d'argocd"
    default: "v2.10.20" # current version of argocd for the lab (202511)
  argocd_username:
    description: "Nom d'utilisateur Argo CD"
    default: "admin"
  argocd_password:
    description: "'Mot de passe de l'utilisateur Argo CD"
    required: true
  app_project_name:
    description: "Le nom du projet où l'application est déployée"
    required: true
  app_name:
    description: "Le nom de l'application"
    required: true
  app_dest_namespace: 
    description: "Namespace Kubernetes de destination de l'application"
    default: "defaultApp"
  delete_persistent_volume_claims:
    description: "Supprimer explicitement les PVC de l'application avant la suppression Argo CD"
    default: "false"

runs:
  using: "composite"
  steps:    

    - name: Vérifier et installer ArgoCD CLI
      shell: bash    
      run: |
        if ! command -v argocd &> /dev/null
        then
            echo "ArgoCD CLI not found, installing..."
            wget https://github.com/argoproj/argo-cd/releases/download/${{inputs.argocd_version}}/argocd-linux-amd64
            sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
            rm argocd-linux-amd64
            echo "ArgoCD CLI installed."
        else
            echo "ArgoCD CLI is already installed."
        fi
        argocd version --client # Verify installation

    - name: Login au Argo CD
      shell: bash
      run: |
        set -e

        echo "Connexion au serveur Argo CD : ${{ inputs.argocd_server }}"

        argocd login "${{ inputs.argocd_server }}" --username "${{ inputs.argocd_username }}" --password "${{ inputs.argocd_password }}" --grpc-web --insecure
        # Capture the exit code of the last command
        if [ $? -ne 0 ]; then
          echo "ArgoCD login failed."
          echo "ERREUR : Impossible de se connecter à Argo CD."
          echo "Causes possibles :"
          echo "   - serveur Argo CD éteint"
          echo "   - URL incorrecte"
          echo "   - problème réseau"
          echo "   - le cluster n’existe pas"
          exit 1          
        else
          echo "Connexion Argo CD réussie"
        fi

    - name: Check si le projet Argo CD existe
      id: check_project
      continue-on-error: true # This ensures the step won't fail the workflow if the command errors
      shell: bash
      run: |
        if argocd proj get ${{ inputs.app_project_name }}; then
          echo "project_exists=true" >> $GITHUB_OUTPUT
        else
          echo "project_exists=false" >> $GITHUB_OUTPUT
        fi 
    
    - name: Quitter si le projet n'existe pas
      shell: bash
      run: |
        if ${{steps.check_project.outputs.project_exists == 'false'}}; then
          echo "Projet ${{inputs.app_project_name}} does not exist, exit workflow. Contactez l'administrateur de projets pour créer le projet"
          exit 0
        else
          echo "Project ${{inputs.app_project_name}} exists, will continue"
        fi

    - name: Check if Argo CD application exists and remove if exists
      shell: bash
      run: |
        set -e

        APP_NAME="${{ inputs.app_name }}"
        APP_DEST_NAMESPACE="${{ inputs.app_dest_namespace }}"
        APP_PROJECT="${{ inputs.app_project_name }}"
        DELETE_PVC="${{ inputs.delete_persistent_volume_claims }}"
        APP_NAMESPACE_ARGS=()
        APP_LABEL="$APP_NAME"
        
        echo "Vérification de l'existence de l'application Argo CD : $APP_LABEL"

        if APP_GET_OUTPUT="$(argocd app get "$APP_NAME" "${APP_NAMESPACE_ARGS[@]}" --grpc-web 2>&1)" ; then
          printf '%s\n' "$APP_GET_OUTPUT"
          echo "Application '$APP_LABEL' trouvée. Suppression en cours ..."

          if [ "$DELETE_PVC" = "true" ]; then
            echo "Suppression explicite des PVC de l'application '$APP_LABEL' dans le namespace Kubernetes '$APP_DEST_NAMESPACE' ..."

            argocd app patch-resource "$APP_NAME" \
              "${APP_NAMESPACE_ARGS[@]}" \
              --project "$APP_PROJECT" \
              --kind PersistentVolumeClaim \
              --namespace "$APP_DEST_NAMESPACE" \
              --all \
              --patch '{"metadata":{"annotations":{"helm.sh/resource-policy":null,"argocd.argoproj.io/sync-options":null}}}' \
              --patch-type application/merge-patch+json \
              --grpc-web || true

          fi

          argocd app delete "$APP_NAME" \
            "${APP_NAMESPACE_ARGS[@]}" \
            --cascade --yes --grpc-web

          echo "Application '$APP_LABEL' supprimée avec succès"
        else
          APP_GET_STATUS=$?
          printf '%s\n' "$APP_GET_OUTPUT"

          if printf '%s\n' "$APP_GET_OUTPUT" | grep -Eiq "code = NotFound|not found|does not exist|n.existe pas"; then
            echo "Application '$APP_LABEL' n'existe pas. Rien à supprimer."
            exit 0
          fi

          echo "::error::Impossible de lire l'application Argo CD '$APP_LABEL'."
          exit "$APP_GET_STATUS"
        fi
